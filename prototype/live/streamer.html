<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Encore — LIVE Streamer Demo (V2G)</title>
<link rel="stylesheet" href="css/live-shell.css">
<link rel="stylesheet" href="css/ai-panel.css">
</head>
<body>
<div id="host">

  <!-- ── BACKGROUND VIDEO ─────────────────────────────────────────── -->
  <div id="video-wrap">
    <video id="live-video" muted playsinline loop preload="metadata">
      <source src="../../reference/videos/encore_test2.mp4" type="video/mp4">
    </video>
  </div>

  <!-- ── TOP CHROME · host strip + event ribbons + LIVE badge ───── -->
  <div id="top-chrome">
    <div id="host-strip">
      <div class="avatar">🎮</div>
      <div class="meta">
        <div class="name">polly_zazaza</div>
        <div class="hearts">♥ 118.0K</div>
      </div>
      <button id="follow-btn" class="follow">+ Follow</button>
      <div class="viewers">👥 480</div>
      <button id="close-btn" class="close">✕</button>
    </div>
    <div id="top-row-2">
      <span class="pill ranking">🎮 Gaming Ranking</span>
    </div>
  </div>

  <div id="event-ribbons">
    <span class="ribbon"><span class="emoji">🌹</span>19/22</span>
    <span class="ribbon timer"><span class="emoji">⏱</span>01:37:57</span>
  </div>

  <div id="live-badge"><span class="pulse"></span>LIVE</div>

  <!-- V2G observer status (Vision debug — small) -->
  <div id="status-bar">
    <div id="status-dot" class="idle"></div>
    <div id="status-text">Click to start LIVE</div>
    <div id="cost">$0.000</div>
    <button id="trigger-btn">FORCE</button>
  </div>

  <!-- ── RIGHT SIDE ACTION BAR (⚡ ENCORE at top) ──────────────── -->
  <nav id="side-actions">
    <button class="side-btn" data-action="share">
      <span class="ico">↗</span><span class="count" data-val="32">32</span>
    </button>
    <button class="side-btn" data-action="gift">
      <span class="ico gift">🎁</span><span class="count" data-val="480">480</span>
    </button>
    <button class="side-btn" data-action="comment">
      <span class="ico">💬</span><span class="count" data-val="148">148</span>
    </button>
    <button class="side-btn" data-action="heart">
      <span class="ico">♥</span><span class="count" data-val="2100">2.1K</span>
    </button>
    <button class="side-btn" id="encore-entry">
      <span class="ico">⚡</span><span class="label">ENCORE</span>
    </button>
  </nav>

  <!-- ── BOTTOM CHROME · chat scroll + Type input ──────────────── -->
  <div id="chat-area"></div>

  <div id="bottom-bar">
    <input id="chat-input" type="text" placeholder="Type..." />
    <button class="small-btn" data-action="smile">😊</button>
    <button class="small-btn" data-action="person">👥</button>
    <button class="small-btn" data-action="gift">🎁<span class="badge">12</span></button>
    <button class="small-btn" data-action="share">↗</button>
  </div>

  <!-- ── BOTTOM SHEET · AI 试玩 panel · 4-state FSM ─────────────── -->
  <div id="sheet" data-state="closed">
    <div id="sheet-handle"></div>
    <div id="sheet-header">
      <span class="label">⚡ ENCORE</span>
      <span class="pill" id="sheet-pill">—</span>
      <span class="timer" id="sheet-timer"></span>
    </div>
    <button id="sheet-close" aria-label="Close">✕</button>

    <iframe id="game-frame" allow="autoplay"></iframe>

    <!-- LOADING overlay -->
    <div id="sheet-loading" class="hidden">
      <div class="robot">🤖</div>
      <div class="headline">AI is crafting your game…</div>
      <div class="subline">…</div>
      <div class="spinner"></div>
    </div>

    <!-- FEEDBACK overlay (shown when sheet[data-state="feedback"]) -->
    <div id="feedback-card">
      <div class="q">How was it?</div>
      <div class="stats" id="fb-stats">—</div>
      <div class="row">
        <button class="fb-btn" data-fb="fun"><span class="emoji">🔥</span>Fun</button>
        <button class="fb-btn" data-fb="hard"><span class="emoji">😅</span>Too hard</button>
        <button class="fb-btn" data-fb="remix"><span class="emoji">🎲</span>Remix</button>
      </div>
    </div>
    <div id="feedback-toast"></div>
  </div>

  <!-- ── AUTOPLAY SHIM ──────────────────────────────────────────── -->
  <div id="autoplay-shim">
    <div class="play">▶</div>
    <div class="lbl">TAP TO ENTER LIVE</div>
    <div class="sub">browser autoplay policy</div>
  </div>
</div>

<script src="js/observer-client.js"></script>
<script src="js/live-chrome.js"></script>
<script src="js/ai-panel-fsm.js"></script>
<script src="js/feedback.js"></script>

<script>
(() => {
  // Default config used when user clicks ⚡ ENCORE manually.
  // Cycles through the 4 templates so demo coverage is easy.
  const DEFAULT_CONFIGS = [
    { template: 'fps',  theme: 'desert', scenario: { enemy_count: 3, hp_start: 60, weapon: 'rifle', description: '1v3 retake' } },
    { template: 'moba', theme: 'grass',  scenario: { enemy_count: 3, hp_start: 80, description: 'dragon pit fight' } },
    { template: 'br',   theme: 'forest', scenario: { enemy_count: 4, hp_start: 60, weapon: 'sniper', description: 'final circle' } },
    { template: 'td',   theme: 'grass',  scenario: { wave_count: 3, enemy_per_wave: 8, tower_budget: 100, description: 'tower defense wave' } },
  ];
  let configCursor = 0;
  // Latest cached config from observer (used when ⚡ ENCORE clicked, if available)
  let cachedDetection = null;
  function nextDefaultConfig() {
    if (cachedDetection) {
      const c = cachedDetection; cachedDetection = null;
      return c;
    }
    const c = DEFAULT_CONFIGS[configCursor % DEFAULT_CONFIGS.length];
    configCursor++;
    return { highlight: true, confidence: 1.0, ...c, _meta: { tokens_in: 0, tokens_out: 0 } };
  }

  const dom = {
    video:     document.getElementById('live-video'),
    dot:       document.getElementById('status-dot'),
    statusEl:  document.getElementById('status-text'),
    costEl:    document.getElementById('cost'),
    sheet:     document.getElementById('sheet'),
    frame:     document.getElementById('game-frame'),
    pill:      document.getElementById('sheet-pill'),
    timerEl:   document.getElementById('sheet-timer'),
    loadingEl: document.getElementById('sheet-loading'),
    sheetClose: document.getElementById('sheet-close'),
    shim:      document.getElementById('autoplay-shim'),
    forceBtn:  document.getElementById('trigger-btn'),
    encoreBtn: document.getElementById('encore-entry'),
    followBtn: document.getElementById('follow-btn'),
    closeBtn:  document.getElementById('close-btn'),
    chatArea:  document.getElementById('chat-area'),
    chatInput: document.getElementById('chat-input'),
    sideButtons: document.querySelectorAll('#side-actions .side-btn'),
    fbCard:    document.getElementById('feedback-card'),
    fbToast:   document.getElementById('feedback-toast'),
    fbButtons: document.querySelectorAll('#feedback-card .fb-btn'),
    fbStats:   document.getElementById('fb-stats'),
  };

  function setStatus(stateClass, text) {
    dom.dot.className = '';
    dom.dot.classList.add(stateClass || 'idle');
    dom.statusEl.textContent = text;
  }
  function setCost(s) { dom.costEl.textContent = s; }

  // ── Wire AiPanel ───────────────────────────────────────────────────
  AiPanel.init({
    sheet:     dom.sheet,
    frame:     dom.frame,
    pill:      dom.pill,
    timerEl:   dom.timerEl,
    loadingEl: dom.loadingEl,
    closeBtn:  dom.sheetClose,
    onActive:  () => ObserverClient.pause(),
    onIdle:    () => {
      setStatus('idle', 'panel closed · resuming sampling…');
      setTimeout(() => ObserverClient.resume(), 500);
    },
    onEnd: (stats) => {
      Feedback.show(stats);
    },
  });

  Feedback.init({
    card:    dom.fbCard,
    toast:   dom.fbToast,
    buttons: dom.fbButtons,
    statsEl: dom.fbStats,
    onChosen: (kind /* , stats */) => {
      AiPanel.feedbackChosen();
    },
  });

  // ── Wire LiveChrome ────────────────────────────────────────────────
  LiveChrome.init({
    video: dom.video,
    shim: dom.shim,
    forceBtn: dom.forceBtn,
    encoreBtn: dom.encoreBtn,
    followBtn: dom.followBtn,
    closeBtn: dom.closeBtn,
    chatArea: dom.chatArea,
    chatInput: dom.chatInput,
    sideButtons: dom.sideButtons,
    onStatus: setStatus,
    onStart: () => {
      // Observer still samples in the background so we can pre-pick a
      // template when the user eventually clicks ⚡ ENCORE — but we no
      // longer auto-pop the panel (sub-doc decision).
      ObserverClient.start({
        video: dom.video,
        onStatus: setStatus,
        onCost: setCost,
        onHighlight: (config) => {
          // CACHE only — never auto-open. The user clicks ⚡ ENCORE.
          cachedDetection = config;
          LiveChrome.pushChat({ kind: 'host', uname: 'host', body: '⚡ encore ready — tap to play' });
        },
      });
    },
    onEncoreClick: () => {
      if (AiPanel.isActive()) return;
      AiPanel.launch(nextDefaultConfig());
      setStatus('detected', '⚡ ENCORE launched (manual)');
    },
    onForceHighlight: () => {
      AiPanel.launch(nextDefaultConfig());
      setStatus('detected', '🎯 FORCED HIGHLIGHT (manual)');
    },
  });
})();
</script>
</body>
</html>
